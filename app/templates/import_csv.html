{% extends "base.html" %}

{% block content %}
<div class="card form-card">
    <h2 style="margin-top: 0;">Import Transactions from CSV</h2>

    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    <p class="text-muted">Expected columns: <code>date,description,amount</code></p>

    <form method="POST" enctype="multipart/form-data" class="form-narrow">
        <div class="field">
            <input type="file" name="csv_file" accept=".csv" required>
        </div>
        <button type="submit" class="btn btn-primary">Import</button>
    </form>

    <a href="{{ url_for('main.index') }}" class="back-link">← Back to dashboard</a>
</div>
{% endblock %}
