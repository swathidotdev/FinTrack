<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FinTech — Budget Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f4f7fb;">
    <div class="card" style="max-width: 400px; width: 100%; margin: 0 1rem;">
        <h1 style="text-align: center; margin-top: 0;">FinTech</h1>
        
        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}

        <form method="POST" class="form-narrow">
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>

        <p style="text-align: center; margin-top: 1rem;">
            Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a>
        </p>
    </div>
</div>
</body>
</html>
