{% extends "base.html" %}

{% block content %}
<div class="card form-card">
    <h2 style="margin-top: 0;">Add a transaction</h2>

    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    <form method="POST" class="form-narrow">
        <div class="field">
            <label>Date</label>
            <input type="date" name="date" value="{{ today }}" required>
        </div>
        <div class="field">
            <label>Description</label>
            <input type="text" name="description" required placeholder="e.g. Uber ride to office">
        </div>
        <div class="field">
            <label>Amount</label>
            <input type="number" step="0.01" name="amount" required placeholder="0.00">
        </div>
        <button type="submit" class="btn btn-primary">Add transaction</button>
    </form>

    <a href="{{ url_for('main.index') }}" class="back-link">← Back to statement</a>
</div>
{% endblock %}
