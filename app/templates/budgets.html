{% extends "base.html" %}

{% block content %}
<h2>Set Category Budgets</h2>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" class="mb-4" style="max-width: 400px;">
    <div class="mb-3">
        <label class="form-label">Category</label>
        <select name="category" class="form-select" required>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Groceries">Groceries</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Rent">Rent</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Monthly Limit</label>
        <input type="number" step="0.01" name="monthly_limit" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Save Budget</button>
</form>

<h3>Current Budgets</h3>
<table class="table table-striped" style="max-width: 400px;">
    <thead><tr><th>Category</th><th>Monthly Limit</th></tr></thead>
    <tbody>
    {% for b in budgets %}
    <tr><td>{{ b.category }}</td><td>₹{{ "%.2f"|format(b.monthly_limit) }}</td></tr>
    {% endfor %}
    </tbody>
</table>

<a href="{{ url_for('main.index') }}">← Back to dashboard</a>
{% endblock %}
