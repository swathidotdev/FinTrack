{% extends "base.html" %}

{% block content %}
<div class="card form-card">
    <h2 style="margin-top: 0;">Set Category Budgets</h2>

    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    <form method="POST" class="form-narrow">
        <div class="field">
            <label>Category</label>
            <select name="category" required>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Groceries">Groceries</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Rent">Rent</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="field">
            <label>Monthly Limit</label>
            <input type="number" step="0.01" name="monthly_limit" required>
        </div>
        <button type="submit" class="btn btn-primary">Save Budget</button>
    </form>

    <h3>Current Budgets</h3>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Category</th><th>Monthly Limit</th></tr></thead>
            <tbody>
            {% for b in budgets %}
            <tr><td>{{ b.category }}</td><td>₹{{ "%.2f"|format(b.monthly_limit) }}</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>

    <a href="{{ url_for('main.index') }}" class="back-link">← Back to dashboard</a>
</div>
{% endblock %}
