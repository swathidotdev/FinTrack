<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FinTrack — Budget Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="topbar">
    <div class="container">
        <a class="brand" href="{{ url_for('main.index') }}">FinTech</a>
        <div class="nav-links">
            <a href="{{ url_for('main.add') }}">Add</a>
            <a href="{{ url_for('main.import_csv') }}">Import</a>
            <a href="{{ url_for('main.budgets') }}">Budgets</a>
            <span style="color: rgba(255,255,255,0.7); margin-left: 1rem;">{{ session.get('username', 'User') }}</span>
            <a href="{{ url_for('auth.logout') }}" style="margin-left: 0.75rem;">Logout</a>
        </div>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
