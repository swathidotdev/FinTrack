<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FinTrack — Budget Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f4f7fb;">
    <div class="card" style="max-width: 400px; width: 100%; margin: 0 1rem;">
        <h1 style="text-align: center; margin-top: 0;">FinTrack</h1>
        
        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}

        <form method="POST" class="form-narrow">
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" required placeholder="At least 6 characters">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
        </form>

        <p style="text-align: center; margin-top: 1rem;">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
        </p>
    </div>
</div>
</body>
</html>
